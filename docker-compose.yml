services:
  social-auto-upload:
    build: .
    container_name: social-auto-upload
    restart: always
    ports:
      - "5409:5409"
    volumes:
      - ./videoFile:/app/videoFile
      - ./uploads:/app/uploads
      - ./cookiesFile:/app/cookiesFile
      - ./cookies:/app/cookies
      - ${SAU_CONF_FILE:-./conf.py}:/app/conf.py
      - ./data:/app/data
      - ./db:/app/db
    networks:
      - 1panel-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # Non-secret overrides only. All secrets come from .env
      - SAU_ACCOUNT_MAINTENANCE_INTERVAL_SECONDS=600
      - SAU_ACCOUNT_MAINTENANCE_EXPIRING_WITHIN_SECONDS=3600
      - BROWSERLESS_URL=http://browserless:3000
      # --- Media public-hosting (publish pipeline) ---
      # Backend order tried by myUtils.media_remote_storage. "share" is the
      # self-hosted tgstate host (preferred); "do_spaces" is the S3/R2 backup.
      - SAU_STORAGE_BACKENDS=share,do_spaces
      # share/tgstate host: disabled until its Telegram bot token is refreshed
      # (getUpdates/sendDocument currently return Unauthorized). To enable:
      # refresh the bot token in the tgstate settings, add SAU_SHARE_SESSION_TOKEN
      # to .env, then set SAU_SHARE_ENABLED=1. While disabled, media is served
      # from DO Spaces / R2.
      - SAU_SHARE_ENABLED=0
      - SAU_SHARE_PUBLIC_BASE=https://share.iamwillywang.com
      - SAU_SHARE_UPLOAD_BASE=http://share-web
      # Verified URL prefixes for TikTok PULL_FROM_URL (DIRECT_POST only).
      # FILE_UPLOAD (draft mode) does not require these. Domains must also be
      # verified in the TikTok developer console before DIRECT_POST works.
      - SAU_TIKTOK_VERIFIED_URL_PREFIXES=https://pub-9915b1494003455c9ab872fd7094e64e.r2.dev/,https://share.iamwillywang.com/

  # Local development PostgreSQL for the multi-tenant migration (Phase 2+).
  # Opt-in: it only starts with `docker compose --profile dev up`, so the
  # production single-service stack is unchanged. Point the app/tests at it via
  #   DATABASE_URL=postgresql+psycopg://sau:sau@postgres:5432/sau
  #   TEST_DATABASE_URL=postgresql+psycopg://sau:sau@localhost:5433/sau
  postgres:
    image: postgres:16-alpine
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: sau
      POSTGRES_PASSWORD: sau
      POSTGRES_DB: sau
    ports:
      - "5433:5432"
    volumes:
      - sau_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sau"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sau_pgdata:

networks:
  1panel-network:
    external: true
