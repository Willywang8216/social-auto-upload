# Alembic configuration for social-auto-upload.
#
# We keep the migration scripts in ``migrations/`` at the workspace root
# rather than under ``db/`` so the layout matches Alembic's standard
# ``alembic init``-shaped expectations and tooling. The default DB URL
# points at the same SQLite file that ``db/createTable.py`` has used since
# day one; production deployments can override via ``-x url=…`` or by
# editing this file in place.
#
# Note on offline mode: ``migrations/env.py`` runs Alembic without any
# SQLAlchemy models because the project's data layer is pure ``sqlite3`` +
# dataclasses. Each version script issues raw SQL through ``op.execute``,
# which is intentionally close to what ``db/createTable.py`` already did.

[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///db/database.db
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
